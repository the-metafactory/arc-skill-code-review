# arc-manifest.yaml — capability declaration
schema: arc/v1
name: code-review
namespace: metafactory
version: 0.4.2
type: skill
tier: custom

authors:
  - name: Jens-Christian Fischer
    github: jcfischer
  - name: mellanon
    github: mellanon

license: MIT

provides:
  skill:
    - trigger: "review PR"
    - trigger: "code review"
    - trigger: "security audit"
    - trigger: "hardening review"
    - trigger: "skill review"

capabilities:
  bash:
    allowed: true
    restricted_to:
      - "gh pr *"
      - "gh api *"
